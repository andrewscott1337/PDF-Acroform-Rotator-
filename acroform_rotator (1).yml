name: AcroForm Dynamic Rotator Function

on:
  workflow_dispatch:

jobs:
  rotate_fields:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python AcroForm Rotator
        run: |
          mkdir -p "Rotated_Output"
          python "PDF-Work-Order-To-Hardware-Sheet/AcroForm Rotator/orient_fields.py" --input_dir "PDF-Work-Order-To-Hardware-Sheet/AcroForm Rotator/Rotation Ref Sheets" --output_dir "Rotated_Output"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Rotated-Hardware-Sheets
          path: Rotated_Output/
